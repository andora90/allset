<!-- @dsCard group="Components" viewport="700x200" subtitle="SlideEyebrow · StatDisplay · LogoWordmark — en contexte slide" name="Slides" -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../styles.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); -webkit-font-smoothing: antialiased; display: flex; height: 200px; }
    .panel { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; justify-content: space-between; }
  </style>
</head>
<body>
  <!-- Dark panel: LogoWordmark + SlideEyebrow + display title -->
  <div class="panel" style="background:var(--allset-obsidian);">
    <div>
      <div style="font-family:var(--font-body);font-size:10px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:rgba(141,91,76,0.85);margin-bottom:10px;">01 — Le Constat</div>
      <div style="font-family:var(--font-display);font-style:italic;font-weight:300;font-size:34px;color:var(--allset-cream);line-height:1;letter-spacing:-0.5px;">"Elle recommence<br>à zéro."</div>
    </div>
    <div style="display:inline-flex;flex-direction:column;align-items:flex-start;">
      <span style="font-family:var(--font-display);font-style:italic;font-weight:400;font-size:22px;color:var(--allset-cream);line-height:1;letter-spacing:-0.5px;">allset</span>
      <div style="width:100%;height:1.5px;background:var(--allset-bark);margin-top:3px;"></div>
    </div>
  </div>
  <!-- Light panel: 3 StatDisplays -->
  <div class="panel" style="background:var(--allset-cream);">
    <div style="font-family:var(--font-body);font-size:10px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:var(--allset-bark);margin-bottom:12px;">Le Marché</div>
    <div style="display:flex;gap:24px;flex:1;align-items:flex-end;">
      <div>
        <div style="font-family:var(--font-display);font-weight:300;font-size:48px;color:var(--allset-obsidian);line-height:0.9;letter-spacing:-2px;">3,5M</div>
        <div style="width:24px;height:1.5px;background:var(--allset-bark);margin:8px 0;"></div>
        <div style="font-family:var(--font-body);font-size:11px;color:var(--allset-pebble);line-height:1.4;">Familles CSP+<br>en France</div>
      </div>
      <div>
        <div style="font-family:var(--font-display);font-weight:300;font-size:48px;color:var(--allset-obsidian);line-height:0.9;letter-spacing:-2px;">10M+</div>
        <div style="width:24px;height:1.5px;background:var(--allset-bark);margin:8px 0;"></div>
        <div style="font-family:var(--font-body);font-size:11px;color:var(--allset-pebble);line-height:1.4;">Voyages famille<br>par an</div>
      </div>
      <div>
        <div style="font-family:var(--font-display);font-weight:300;font-size:48px;color:var(--allset-bark);line-height:0.9;letter-spacing:-2px;opacity:0.75;">0</div>
        <div style="width:24px;height:1.5px;background:var(--allset-bark);margin:8px 0;"></div>
        <div style="font-family:var(--font-body);font-size:11px;color:var(--allset-pebble);line-height:1.4;">Solution dédiée<br>sur le marché</div>
      </div>
    </div>
  </div>
</body>
</html>
