<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 900px; height: 400px; overflow: hidden; background: #F5F0E8; }
    .logo { width: 900px; height: 400px; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 0 64px; }
    .wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 210px;
      color: #1C1714;
      line-height: 1;
      letter-spacing: -2px;
    }
    .line {
      width: 772px;
      height: 3px;
      background: #8D5B4C;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="wordmark">allset</div>
    <div class="line"></div>
  </div>
</body>
</html>
