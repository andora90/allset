<!--
  ALLSET — "Détail étape" Custom Code Block pour Softr
  ──────────────────────────────────────────────────────
  Coller dans : Page Settings → Custom Code → Body
  URL attendue : /detail-etape?recordId=recXXX

  Fonctionnalités :
  - Affichage header : type, nom, date début/fin, réf., statut
  - Bouton "Modifier" → /modifier-etape?recordId=recXXX
  - Checklist avec toggle optimiste (PATCH Airtable)
-->

<!-- ── FONTS ───────────────────────────────────────────────────────── -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">

<!-- ── STYLES ─────────────────────────────────────────────────────── -->
<style>
  .de { font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; background:#fff; color:#1A1816;
        -webkit-font-smoothing:antialiased; }

  /* ── Header ── */
  .de-hdr { padding:16px 20px 20px; border-bottom:1px solid #DDD6C8; }
  .de-hdr-top { display:flex; align-items:flex-start; margin-bottom:14px; }
  .de-back { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600;
             letter-spacing:.3px; color:#7A756D; text-decoration:none; }
  .de-back:active { opacity:.6; }

  .de-hdr-type { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
                 color:#7A756D; margin-bottom:6px; }
  .de-hdr-nom  { font-family:'Playfair Display',Georgia,serif; font-style:italic;
                 font-size:24px; line-height:1.2; color:#1A1816; margin:0 0 10px; }

  /* ── Bouton Modifier (div pour éviter les overrides Softr sur <a> et <button>) ── */
  .de-modify-btn {
    display:inline-block !important;
    visibility:visible !important;
    opacity:1 !important;
    font-size:12px !important; font-weight:600 !important; letter-spacing:.3px !important;
    color:#1A1816 !important;
    background:#EBE6DC !important;
    border:1px solid #DDD6C8 !important;
    border-radius:6px !important;
    padding:7px 16px !important;
    margin-bottom:14px !important;
    cursor:pointer !important;
    user-select:none;
    -webkit-user-select:none;
  }
  .de-modify-btn:active { opacity:.6 !important; }

  /* ── Méta DATE / RÉF. / STATUT ── */
  .de-meta { display:flex; flex-direction:column; gap:6px; }
  .de-meta-row { display:flex; align-items:center; gap:8px; font-size:13px; color:#1A1816; }
  .de-meta-lbl { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
                 color:#B8B0A4; width:64px; flex-shrink:0; }

  /* ── Statut badge ── */
  .de-badge { display:inline-flex; align-items:center;
              font-size:11px; font-weight:700; letter-spacing:.3px;
              padding:4px 10px; border-radius:6px; }
  .badge-ok   { background:#E8F5E9; color:#2E7D32; }
  .badge-wip  { background:#FFF8E1; color:#E65100; }
  .badge-gray { background:#F5F5F5; color:#757575; }

  /* ── Progress ── */
  .de-prog { display:flex; align-items:center; gap:12px; padding:14px 20px;
             border-bottom:1px solid #DDD6C8; }
  .de-prog-txt { font-size:13px; color:#7A756D; }
  .de-prog-txt strong { color:#1A1816; }
  .de-prog-bar  { flex:1; height:3px; background:#DDD6C8; border-radius:2px; }
  .de-prog-fill { height:100%; background:#1A1816; border-radius:2px; transition:width .4s; }

  /* ── Section label ── */
  .de-sec { font-size:10px; letter-spacing:1.5px; color:#7A756D; text-transform:uppercase;
            padding:14px 20px 10px; border-bottom:1px solid #DDD6C8; }

  /* ── Checklist items ── */
  .de-item { display:flex; align-items:center; gap:14px; padding:14px 20px;
             border-bottom:1px solid #DDD6C8; cursor:pointer;
             -webkit-tap-highlight-color:transparent; transition:background .1s; }
  .de-item:active { background:#FAFAF7; }
  .de-item.is-checked .de-item-lbl { color:#B8B0A4; text-decoration:line-through;
                                      text-decoration-color:#DDD6C8; }
  .de-cb { width:22px; height:22px; border-radius:6px; flex-shrink:0;
           border:2px solid #DDD6C8; display:flex; align-items:center; justify-content:center;
           transition:all .15s; }
  .de-cb.checked { background:#1A1816; border-color:#1A1816; }
  .de-cb svg { width:12px; height:12px; opacity:0; transition:opacity .15s; }
  .de-cb.checked svg { opacity:1; }
  .de-item-lbl { font-size:15px; flex:1; line-height:1.3; transition:color .2s; }

  /* ── Empty / loading ── */
  .de-empty { padding:32px 20px; text-align:center; color:#B8B0A4; font-size:14px; line-height:1.6; }
</style>

<!-- ── MARKUP ──────────────────────────────────────────────────────── -->
<div class="de">

  <div class="de-hdr" id="de-hdr" style="display:none">
    <div class="de-hdr-top">
      <a class="de-back" id="de-back" href="/mon-dashboard-voyages">← Retour au voyage</a>
    </div>
    <div class="de-hdr-type" id="de-type"></div>
    <div class="de-hdr-nom"  id="de-nom"></div>
    <div class="de-modify-btn" id="de-modify-btn">Modifier</div>
    <div class="de-meta" id="de-meta">
      <div class="de-meta-row" id="de-date-row" style="display:none">
        <span class="de-meta-lbl">Date</span>
        <span id="de-date"></span>
      </div>
      <div class="de-meta-row" id="de-ref-row" style="display:none">
        <span class="de-meta-lbl">Réf.</span>
        <span id="de-ref"></span>
      </div>
      <div class="de-meta-row" id="de-statut-row" style="display:none">
        <span class="de-meta-lbl">Statut</span>
        <span class="de-badge" id="de-statut"></span>
      </div>
    </div>
  </div>

  <div class="de-prog" id="de-prog" style="display:none">
    <div class="de-prog-bar"><div class="de-prog-fill" id="de-prog-fill" style="width:0%"></div></div>
    <div class="de-prog-txt"><strong id="de-prog-done">0</strong> / <span id="de-prog-total">0</span></div>
  </div>

  <div class="de-sec">Checklist</div>
  <div id="de-items"><div class="de-empty">Chargement…</div></div>

</div>

<!-- ── LOGIC ──────────────────────────────────────────────────────── -->
<script type="module">

  /* ═══════════════════════════════════════════════════════════════
     CONFIG
  ═══════════════════════════════════════════════════════════════ */
  const CFG = {
    PAT:     'patbM2QbcF7qIFBo3.a29d7f2185dfdbc2d08d716ae7851b05b290ce8a01ccb4b3a54bf4fa36d815f9',
    BASE_ID: 'appFVKKftkjTeYrO7',

    TABLES: {
      ETAPE:     'tblH5zDlgVMerNdhi',
      CHECKLIST: 'tblAksOV1ZaBl3c5R',
    },

    PAGES: {
      DASHBOARD: '/mon-dashboard-voyages',
      MODIFIER:  '/modifier-etape',
    },

    FIELDS: {
      ETAPE: {
        label:              'label',
        typeEtape:          'type_etape',
        statutConfirmation: 'statut_confirmation',
        dateDebut:          'date_etape',
        dateFin:            'date_fin',
        confirmationRef:    'confirmation_ref',
        voyageId:           'voyage_id',
        checklistItems:     '04_CHECKLIST_ITEM',
      },
      CHECKLIST: {
        label:     'label',
        isChecked: 'is_checked',
      },
    },
  };


  const CHECK_SVG = `<svg viewBox="0 0 12 12" fill="none">
    <path d="M2 6L5 9.5L10 2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;

  /* ═══════════════════════════════════════════════════════════════
     UTILITAIRES
  ═══════════════════════════════════════════════════════════════ */
  function getEtapeId() {
    const tpl = '{record_id}';
    if (tpl !== '{record_id}' && tpl.startsWith('rec')) return tpl;
    const q = new URLSearchParams(window.location.search).get('recordId')
           || new URLSearchParams(window.location.search).get('record_id');
    if (q?.startsWith('rec')) return q;
    return window.location.pathname.split('/').find(s => s.startsWith('rec')) || null;
  }

  const FR_MONTHS = ['jan.','fév.','mars','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];

  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso.substring(0,10) + 'T00:00:00');
    return isNaN(d.getTime()) ? '' : `${d.getDate()} ${FR_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  }

  function fmtDateRange(debut, fin) {
    if (!debut && !fin) return '';
    if (!fin) return fmtDate(debut);
    return `${fmtDate(debut)} → ${fmtDate(fin)}`;
  }

  /* ═══════════════════════════════════════════════════════════════
     AIRTABLE FETCH / PATCH
  ═══════════════════════════════════════════════════════════════ */
  const readHdrs  = { Authorization: `Bearer ${CFG.PAT}` };
  const writeHdrs = { Authorization: `Bearer ${CFG.PAT}`, 'Content-Type': 'application/json' };

  async function fetchEtape(etapeId) {
    const res = await fetch(
      `https://api.airtable.com/v0/${CFG.BASE_ID}/${CFG.TABLES.ETAPE}/${etapeId}`,
      { headers: readHdrs }
    );
    if (!res.ok) throw new Error(`Airtable ${res.status}`);
    return res.json();
  }

  async function fetchChecklistItems(ids) {
    if (!ids?.length) return [];
    const formula = ids.length === 1
      ? `RECORD_ID()="${ids[0]}"`
      : `OR(${ids.map(id => `RECORD_ID()="${id}"`).join(',')})`;
    const FC = CFG.FIELDS.CHECKLIST;
    const params = [
      `filterByFormula=${encodeURIComponent(formula)}`,
      `fields[]=${FC.label}`,
      `fields[]=${FC.isChecked}`,
    ].join('&');
    const res = await fetch(
      `https://api.airtable.com/v0/${CFG.BASE_ID}/${CFG.TABLES.CHECKLIST}?${params}`,
      { headers: readHdrs }
    );
    if (!res.ok) throw new Error(`Airtable ${res.status}`);
    const data = await res.json();
    return data.records || [];
  }

  async function patchChecklistItem(itemId, isChecked) {
    await fetch(
      `https://api.airtable.com/v0/${CFG.BASE_ID}/${CFG.TABLES.CHECKLIST}/${itemId}`,
      {
        method:  'PATCH',
        headers: writeHdrs,
        body:    JSON.stringify({ fields: { [CFG.FIELDS.CHECKLIST.isChecked]: isChecked } }),
      }
    );
  }

  /* ═══════════════════════════════════════════════════════════════
     RENDU HEADER
  ═══════════════════════════════════════════════════════════════ */
  function renderHeader(etape, etapeId) {
    const FE = CFG.FIELDS.ETAPE;

    document.getElementById('de-type').textContent =
      etape.fields?.[FE.typeEtape] || '';
    document.getElementById('de-nom').textContent  =
      etape.fields?.[FE.label] || etape.fields?.[FE.typeEtape] || '—';

    // Lien retour voyage
    const voyageId = (etape.fields?.[FE.voyageId] || [])[0] || null;
    if (voyageId) {
      document.getElementById('de-back').href =
        `${CFG.PAGES.DASHBOARD}?recordId=${voyageId}`;
    }

    // Bouton Modifier — div + onclick pour contourner les overrides Softr sur <a>/<button>
    document.getElementById('de-modify-btn').onclick = () => {
      window.location.href = `${CFG.PAGES.MODIFIER}?recordId=${etapeId}`;
    };

    // Date
    const range = fmtDateRange(
      etape.fields?.[FE.dateDebut] || '',
      etape.fields?.[FE.dateFin]   || ''
    );
    if (range) {
      document.getElementById('de-date').textContent  = range;
      document.getElementById('de-date-row').style.display = '';
    }

    // Réf.
    const ref = etape.fields?.[FE.confirmationRef] || '';
    if (ref) {
      document.getElementById('de-ref').textContent  = ref;
      document.getElementById('de-ref-row').style.display = '';
    }

    // Statut
    const statut = etape.fields?.[FE.statutConfirmation] || '';
    if (statut) {
      const el = document.getElementById('de-statut');
      el.textContent = statut;
      el.className   = 'de-badge';
      document.getElementById('de-statut-row').style.display = '';
    }

    document.getElementById('de-hdr').style.display  = '';
    document.getElementById('de-prog').style.display = '';
  }

  /* ═══════════════════════════════════════════════════════════════
     CHECKLIST
  ═══════════════════════════════════════════════════════════════ */
  function updateProgress(items) {
    const done  = items.filter(r => r.checked).length;
    const total = items.length;
    document.getElementById('de-prog-done').textContent  = done;
    document.getElementById('de-prog-total').textContent = total;
    document.getElementById('de-prog-fill').style.width  =
      total ? Math.round(done / total * 100) + '%' : '0%';
  }

  /* ═══════════════════════════════════════════════════════════════
     RENDU PRINCIPAL
  ═══════════════════════════════════════════════════════════════ */
  async function render() {
    const etapeId = getEtapeId();
    if (!etapeId) {
      document.getElementById('de-items').innerHTML =
        '<div class="de-empty">Ouvrez une étape depuis le dashboard voyage.</div>';
      return;
    }

    try {
      const etape   = await fetchEtape(etapeId);
      const itemIds = etape.fields?.[CFG.FIELDS.ETAPE.checklistItems] || [];

      renderHeader(etape, etapeId);

      const records = await fetchChecklistItems(itemIds);
      const items   = records.map(r => ({
        id:      r.id,
        label:   r.fields[CFG.FIELDS.CHECKLIST.label]     || '—',
        checked: !!r.fields[CFG.FIELDS.CHECKLIST.isChecked],
      }));

      const itemsEl = document.getElementById('de-items');

      if (!items.length) {
        itemsEl.innerHTML = '<div class="de-empty">Aucun item checklist pour cette étape.</div>';
        updateProgress([]);
        return;
      }

      function renderItems() {
        itemsEl.innerHTML = items.map((item, i) => `
          <div class="de-item ${item.checked ? 'is-checked' : ''}" data-i="${i}">
            <div class="de-cb ${item.checked ? 'checked' : ''}">${CHECK_SVG}</div>
            <div class="de-item-lbl">${item.label}</div>
          </div>
        `).join('');

        itemsEl.querySelectorAll('.de-item').forEach(el => {
          el.addEventListener('click', async () => {
            const i      = parseInt(el.dataset.i);
            const newVal = !items[i].checked;
            items[i].checked = newVal;
            renderItems();
            updateProgress(items);
            await patchChecklistItem(items[i].id, newVal).catch(err => {
              items[i].checked = !newVal;
              renderItems();
              updateProgress(items);
              console.error('[Allset] patch checklist:', err);
            });
          });
        });
      }

      renderItems();
      updateProgress(items);

    } catch (err) {
      console.error('[Allset] detail-etape:', err);
      document.getElementById('de-items').innerHTML =
        `<div class="de-empty">Impossible de charger cette étape.<br>
        <small style="color:#B8B0A4">${err.message}</small></div>`;
    }
  }

  /* ═══════════════════════════════════════════════════════════════
     INIT — compatible SPA Softr
  ═══════════════════════════════════════════════════════════════ */
  if (typeof window.SOFTR_PAGE?.waitFor === 'function') {
    window.SOFTR_PAGE.waitFor(() => !!getEtapeId()).then(render).catch(render);
  } else {
    setTimeout(render, 800);
  }

</script>
